<load target="vmc.slider.full.js" />
<load target="mh_slide.css" />

<style>
#mh_slide_outer_{$slide_info->srl} .vui-item img { object-fit:{$slide_info->object_fit} !important; }
#mh_slide_outer_{$slide_info->srl} .vui-item { background:transparent; }
<!--@if($slide_info->show_thumbs)-->
#mh_slide_outer_{$slide_info->srl} .vui-buttons { display:none !important; }
<!--@end-->
<!--@if($slide_info->full_width)-->
#mh_slide_outer_{$slide_info->srl}{width:100% !important;max-width:100% !important;}
#mh_slide_outer_{$slide_info->srl} .mh_slide_wrap{width:100% !important;height:auto !important;aspect-ratio:{$slide_info->width} / {$slide_info->height} !important;}
#mh_slide_outer_{$slide_info->srl} .vui-slider{position:absolute !important;top:0;left:0;transform-origin:0 0;}
<!--@end-->
@media (max-width:640px){
	#mh_slide_outer_{$slide_info->srl}{width:100% !important;max-width:100% !important;}
	#mh_slide_outer_{$slide_info->srl} .mh_slide_wrap{width:100% !important;height:auto !important;aspect-ratio:{$slide_info->width} / {$slide_info->height} !important;}
	#mh_slide_outer_{$slide_info->srl} .vui-slider{position:absolute !important;top:0;left:0;transform-origin:0 0;}
}
</style>

<div id="mh_slide_outer_{$slide_info->srl}" class="mh_slide_outer mh_slide_align_{$slide_info->align}" style="width:{$slide_info->width}px;{$slide_info->margin_style}">
	<div class="mh_slide_wrap" style="width:{$slide_info->width}px;height:{$slide_info->height}px;">
		<div id="mh_slide_{$slide_info->srl}">
		<!--@foreach($slide_info->slides as $slide)-->
			<!-- prettyPhoto 애드온이 자동으로 처리하는 방식(너비/높이 기준 검사)은 숨겨진(비활성) 슬라이드에는
			     적용되지 않으므로(display:none 상태라 크기가 0으로 측정됨), rel/href를 직접 지정하고
			     img에는 no_pp를 줘서 애드온의 자동 랩핑 로직을 건너뛰게 한다.
			     (애드온은 rel="prettyPhoto..." 로 시작하는 앵커를 찾아 뷰어를 바인딩하므로, 직접 지정해도 정상 작동) -->
			<a href="{$slide->src}" rel="prettyPhoto[mh_slide_{$slide_info->srl}]">
				<img src="{$slide->src}" alt="" class="no_pp" />
				<!--@if($slide->caption_html)-->
				<span class="mh_slide_caption">{$slide->caption_html}</span>
				<!--@end-->
			</a>
		<!--@end-->
		</div>
	</div>
	<!--@if($slide_info->show_thumbs)-->
	<div class="mh_slide_thumbs">
	<!--@foreach($slide_info->slides as $slide)-->
		<div class="mh_slide_thumb"><img src="{$slide->src}" alt="" class="no_pp" /></div>
	<!--@end-->
	</div>
	<!--@end-->
</div>

<script>
jQuery(function($){
	var $outer = $('#mh_slide_outer_{$slide_info->srl}');

	// 모바일(가로 640px 이하) 화면에서는 기본적으로 성능/터치 환경을 고려해 전환효과 없이
	// 즉시 전환되도록 처리하지만, 팝업의 "반응형/모바일에서도 전환효과 사용" 옵션이 켜져
	// 있으면(responsive_effect_js) 모바일에서도 선택한 전환효과를 그대로 사용한다.
	var is_mobile = window.matchMedia && window.matchMedia('(max-width:640px)').matches;
	var allow_responsive_effect = {$slide_info->responsive_effect_js};
	var effects_list = (is_mobile && !allow_responsive_effect) ? [] : [{$slide_info->effects_js}];

	var $mhSlide = $('#mh_slide_{$slide_info->srl}').vmcSlider({
		width: {$slide_info->width},
		height: {$slide_info->height},
		gridCol: 10,
		gridRow: 5,
		gridVertical: 20,
		gridHorizontal: 10,
		autoPlay: {$slide_info->auto_play_js},
		ascending: {$slide_info->ascending_order_js},
		effects: effects_list,
		ie6Tidy: false,
		random: {$slide_info->random_effect_js},
		duration: {$slide_info->duration},
		speed: {$slide_info->speed},
		containMode: {$slide_info->contain_mode_js}
	});

	var $wrap = $outer.find('.mh_slide_wrap');
	var $vuiSlider = $outer.find('.vui-slider');

	// 그리드 기반 전환효과(블라인드/모자이크 등)는 opts.width/opts.height(고정 px) 좌표계를
	// 기준으로 조각들의 위치/크기를 계산한다. 반응형/모바일에서 .mh_slide_wrap을 실제 화면
	// 폭에 맞게 늘리더라도, .vui-slider 자체는 원래 px 크기를 유지한 채 transform:scale()로
	// 통째로 축소/확대해서 보여주면, 내부 조각들의 상대적 위치가 항상 정확히 유지되어
	// 어긋나 보이는 문제가 생기지 않는다. (평소 고정 크기 슬라이드는 wrap 너비가 opts.width와
	// 같아서 scale이 1이 되므로 아무 영향 없음)
	function updateSlideScale() {
		if (!$vuiSlider.length) return;
		var wrapWidth = $wrap.width();
		if (!wrapWidth) return;
		var scale = wrapWidth / {$slide_info->width};
		$vuiSlider.css('transform', 'scale(' + scale + ')');
	}
	updateSlideScale();

	var scaleResizeTimer;
	$(window).on('resize orientationchange', function(){
		clearTimeout(scaleResizeTimer);
		scaleResizeTimer = setTimeout(updateSlideScale, 150);
	});

	// 마우스 오버(PC) 또는 터치(모바일) 중에는 자동 슬라이딩을 멈추고,
	// 벗어나면(mouseleave/touchend) 다시 자동 재생을 이어감.
	//
	// 주의: 단순히 clearTimeout(inst.time)만 하면, hover가 "전환 애니메이션 진행 중"에
	// 시작된 경우 애니메이션이 끝나는 시점에 플러그인 자체 로직(_afterTransfer)이
	// autoPlay 타이머를 새로 걸어버려서 hover 중인데도 슬라이딩이 재개되는 문제가 있었음
	// (멈춤이 "되었다 안되었다" 하던 원인). 그래서 인스턴스의 _afterTransfer를 감싸서
	// isPaused 상태일 때는 전환이 끝나도 타이머가 다시 걸리지 않도록 처리.
	(function(){
		var inst = $mhSlide.data('vomoc');
		if (!inst) return;

		var isPaused = false;
		var origAfterTransfer = inst._afterTransfer;

		inst._afterTransfer = function(){
			origAfterTransfer.apply(this, arguments);
			if (isPaused) {
				clearTimeout(this.time);
			}
		};

		function pauseAutoPlay() {
			isPaused = true;
			clearTimeout(inst.time);
		}

		function resumeAutoPlay() {
			isPaused = false;
			if (true !== inst.options.autoPlay) return;
			clearTimeout(inst.time);
			inst.time = setTimeout(function(){
				if (true === inst.options.ascending) {
					inst._next();
				} else {
					inst._prev();
				}
			}, inst.options.duration);
		}

		$outer.on('mouseenter touchstart', pauseAutoPlay);
		$outer.on('mouseleave touchend touchcancel', resumeAutoPlay);
	})();

	// contain 모드(가로/세로 중 하나만 지정, 또는 반응형)에서는 각 이미지가 실제 비율대로
	// 다르게 표시된다(꽉 채워지는 이미지도 있고, 레터박스가 생기는 좁은/작은 비율 이미지도 있음).
	// 그런데 그리드 전환효과는 배경이미지를 무조건 컨테이너 크기(opts.width x opts.height)로
	// 꽉 채워(찌그러뜨려) 그리다가, 전환이 끝나면 실제 <img object-fit:contain>으로 교체되면서
	// 비로소 올바른(더 작아 보이는) 크기로 나타난다 — 이게 "작은 이미지가 전환 중엔 크게 보였다가
	// 끝나고 나서 작아진다"는 현상의 원인이다.
	// 아래에서 _setStage를 감싸서, 그리드 조각들이 참조하는 배경이미지의 크기/위치를
	// object-fit:contain과 동일한 방식(비율 유지 + 가운데 정렬)으로 다시 계산해 적용한다.
	// 그러면 전환 도중에도 최종적으로 보일 크기와 똑같이 표시되어 "돌아가 보이는" 현상이 없어진다.
	<!--@if($slide_info->object_fit == 'contain')-->
	(function(){
		var inst = $mhSlide.data('vomoc');
		if (!inst) return;

		var origSetStage = inst._setStage;

		inst._setStage = function(stage){
			origSetStage.call(this, stage);

			var opts = this.options;
			var imgEl = this.node.item.eq(this.index).find('img')[0];
			// 이미지가 아직 로드되지 않아 자연 크기를 알 수 없으면(드문 경우) 기본 동작을 그대로 둔다
			if (!imgEl || !imgEl.naturalWidth || !imgEl.naturalHeight) return;

			var W = opts.width, H = opts.height;
			var iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
			var k = Math.min(W / iw, H / ih);
			var dw = iw * k, dh = ih * k;
			var offsetX = (W - dw) / 2, offsetY = (H - dh) / 2;

			var $children = this.node.transfer.children();
			var n = $children.length;
			var coords = [];

			if (stage === 0) {
				var gridW = W / opts.gridCol, gridH = H / opts.gridRow;
				for (var i = 0; i < n; i++) {
					coords.push({ left: gridW * (i % opts.gridCol), top: gridH * Math.floor(i / opts.gridCol) });
				}
			} else if (stage === 1) {
				var stripH = H / opts.gridHorizontal;
				for (var i = 0; i < n; i++) {
					coords.push({ left: 0, top: stripH * i });
				}
			} else {
				var stripW = W / opts.gridVertical;
				for (var i = 0; i < n; i++) {
					coords.push({ left: stripW * i, top: 0 });
				}
			}

			$children.each(function(i){
				$(this).css({
					backgroundSize: dw + 'px ' + dh + 'px',
					backgroundPosition: (-(coords[i].left - offsetX)) + 'px ' + (-(coords[i].top - offsetY)) + 'px'
				});
			});
		};
	})();
	<!--@end-->

	// 썸네일 클릭 시 해당 슬라이드로 이동 (플러그인이 만든 dot 버튼을 대신 클릭시켜서 이동)
	$outer.find('.mh_slide_thumb').on('click', function(){
		var idx = $(this).index();
		$outer.find('.vui-buttons .vui-button').eq(idx).trigger('click');
	});

	// 자동재생/좌우버튼/썸네일 클릭 등 어떤 방식으로 슬라이드가 바뀌어도
	// 현재 보여지는 이미지의 썸네일만 뚜렷하게, 나머지는 흐리게 표시되도록 동기화
	function syncActiveThumb() {
		var curIdx = $outer.find('.vui-buttons .vui-button-cur').index();
		if (curIdx < 0) return;
		$outer.find('.mh_slide_thumb').removeClass('mh_slide_thumb_active').eq(curIdx).addClass('mh_slide_thumb_active');
	}

	var buttonsEl = $outer.find('.vui-buttons')[0];
	if (buttonsEl && window.MutationObserver) {
		var mo = new MutationObserver(syncActiveThumb);
		mo.observe(buttonsEl, { attributes: true, attributeFilter: ['class'], subtree: true });
	}
	syncActiveThumb();
});
</script>
